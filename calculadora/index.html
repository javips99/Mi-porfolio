<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora | Javi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --coral: #FF6B6B;
            --yellow: #FFE66D;
            --mint: #4ECDC4;
            --purple: #A855F7;
            --blue: #3B82F6;
            --pink: #F472B6;
            --dark: #1a1a2e;
            --darker: #0f0f23;
            --light: #f0f0f0;
            --white: #ffffff;
            --font-display: 'Syne', sans-serif;
            --font-body: 'DM Sans', sans-serif;
        }

        body {
            font-family: var(--font-body);
            background: var(--darker);
            color: var(--light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            overflow-x: hidden;
        }

        /* Noise texture overlay */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
        }

        /* Background blobs */
        .bg-blobs {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.2;
            animation: float 10s ease-in-out infinite;
        }

        .blob-1 {
            width: 400px; height: 400px;
            background: var(--coral);
            top: -100px; left: -100px;
            animation-delay: 0s;
        }

        .blob-2 {
            width: 350px; height: 350px;
            background: var(--mint);
            bottom: -100px; right: -100px;
            animation-delay: -4s;
        }

        .blob-3 {
            width: 300px; height: 300px;
            background: var(--purple);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -8s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(20px, -15px) scale(1.03); }
            66% { transform: translate(-15px, 15px) scale(0.97); }
        }

        /* Header */
        header {
            position: relative;
            z-index: 1;
            text-align: center;
            margin-bottom: 2rem;
        }

        header h1 {
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(240,240,240,0.4);
        }

        header h1 span {
            background: linear-gradient(135deg, var(--coral), var(--yellow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Calculator wrapper */
        .calculator {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 360px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 28px;
            padding: 1.5rem;
            box-shadow:
                0 25px 60px rgba(0,0,0,0.4),
                0 0 0 1px rgba(255,255,255,0.04) inset;
            backdrop-filter: blur(20px);
        }

        /* Display */
        .display {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            padding: 1.2rem 1.4rem;
            margin-bottom: 1.2rem;
            text-align: right;
            min-height: 90px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            overflow: hidden;
        }

        .display-expression {
            font-family: var(--font-body);
            font-size: 0.85rem;
            color: rgba(240,240,240,0.35);
            min-height: 1.2rem;
            margin-bottom: 0.3rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            transition: all 0.2s ease;
        }

        .display-value {
            font-family: var(--font-display);
            font-size: 2.6rem;
            font-weight: 700;
            color: var(--white);
            line-height: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            transition: all 0.15s ease;
        }

        .display-value.small { font-size: 1.8rem; }
        .display-value.xsmall { font-size: 1.3rem; }

        /* Buttons grid */
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.6rem;
        }

        /* Button base */
        .btn {
            position: relative;
            overflow: hidden;
            border: none;
            border-radius: 14px;
            padding: 0;
            height: 68px;
            font-family: var(--font-display);
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s ease, box-shadow 0.2s ease;
            outline: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:active {
            transform: scale(0.93);
        }

        /* Ripple effect */
        .btn .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: scale(0);
            animation: ripple-anim 0.5s linear;
            pointer-events: none;
        }

        @keyframes ripple-anim {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        /* Digit buttons */
        .btn-digit {
            background: rgba(255,255,255,0.07);
            color: var(--white);
            border: 1px solid rgba(255,255,255,0.08);
        }

        .btn-digit:hover {
            background: rgba(255,255,255,0.12);
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        /* Zero button (spans 2 columns) */
        .btn-zero {
            grid-column: span 2;
        }

        /* Operator buttons */
        .btn-operator {
            background: rgba(255,107,107,0.15);
            color: var(--coral);
            border: 1px solid rgba(255,107,107,0.2);
        }

        .btn-operator:hover {
            background: rgba(255,107,107,0.25);
            box-shadow: 0 4px 20px rgba(255,107,107,0.2);
        }

        /* Clear button */
        .btn-clear {
            background: rgba(168,85,247,0.15);
            color: var(--purple);
            border: 1px solid rgba(168,85,247,0.2);
        }

        .btn-clear:hover {
            background: rgba(168,85,247,0.25);
            box-shadow: 0 4px 20px rgba(168,85,247,0.2);
        }

        /* Backspace button */
        .btn-back {
            background: rgba(255,230,109,0.12);
            color: var(--yellow);
            border: 1px solid rgba(255,230,109,0.2);
            font-size: 1.1rem;
        }

        .btn-back:hover {
            background: rgba(255,230,109,0.2);
            box-shadow: 0 4px 20px rgba(255,230,109,0.15);
        }

        /* Percent button */
        .btn-percent {
            background: rgba(78,205,196,0.12);
            color: var(--mint);
            border: 1px solid rgba(78,205,196,0.2);
        }

        .btn-percent:hover {
            background: rgba(78,205,196,0.2);
            box-shadow: 0 4px 20px rgba(78,205,196,0.15);
        }

        /* Equals button */
        .btn-equals {
            background: linear-gradient(135deg, var(--mint), var(--blue));
            color: var(--white);
            border: none;
            box-shadow: 0 4px 25px rgba(78,205,196,0.3);
            font-size: 1.4rem;
        }

        .btn-equals:hover {
            box-shadow: 0 8px 35px rgba(78,205,196,0.45);
            transform: translateY(-1px);
        }

        .btn-equals:active {
            transform: scale(0.93);
        }

        /* Error state on display */
        .display.error .display-value {
            color: var(--coral);
        }

        /* Footer */
        footer {
            position: relative;
            z-index: 1;
            margin-top: 2rem;
            text-align: center;
            color: rgba(240,240,240,0.2);
            font-size: 0.75rem;
        }

        footer a {
            color: rgba(255,107,107,0.5);
            text-decoration: none;
            transition: color 0.3s;
        }

        footer a:hover {
            color: var(--coral);
        }

        /* Keyboard hint */
        .keyboard-hint {
            position: relative;
            z-index: 1;
            margin-top: 1rem;
            text-align: center;
            color: rgba(240,240,240,0.2);
            font-size: 0.7rem;
            letter-spacing: 0.5px;
        }

        /* Responsive */
        @media (max-width: 400px) {
            .calculator {
                padding: 1.2rem;
                border-radius: 22px;
            }

            .btn {
                height: 60px;
                font-size: 1.1rem;
                border-radius: 12px;
            }

            .display-value {
                font-size: 2.2rem;
            }

            .buttons {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <header>
        <h1><span>Calcu</span>ladora</h1>
    </header>

    <div class="calculator" id="calculator">
        <div class="display" id="display">
            <div class="display-expression" id="expression"></div>
            <div class="display-value" id="displayValue">0</div>
        </div>

        <div class="buttons">
            <!-- Row 1 -->
            <button class="btn btn-clear" data-action="clear" aria-label="Limpiar">C</button>
            <button class="btn btn-back" data-action="backspace" aria-label="Borrar">⌫</button>
            <button class="btn btn-percent" data-action="percent" aria-label="Porcentaje">%</button>
            <button class="btn btn-operator" data-action="operator" data-value="/" aria-label="Dividir">÷</button>

            <!-- Row 2 -->
            <button class="btn btn-digit" data-action="digit" data-value="7">7</button>
            <button class="btn btn-digit" data-action="digit" data-value="8">8</button>
            <button class="btn btn-digit" data-action="digit" data-value="9">9</button>
            <button class="btn btn-operator" data-action="operator" data-value="*" aria-label="Multiplicar">×</button>

            <!-- Row 3 -->
            <button class="btn btn-digit" data-action="digit" data-value="4">4</button>
            <button class="btn btn-digit" data-action="digit" data-value="5">5</button>
            <button class="btn btn-digit" data-action="digit" data-value="6">6</button>
            <button class="btn btn-operator" data-action="operator" data-value="-" aria-label="Restar">−</button>

            <!-- Row 4 -->
            <button class="btn btn-digit" data-action="digit" data-value="1">1</button>
            <button class="btn btn-digit" data-action="digit" data-value="2">2</button>
            <button class="btn btn-digit" data-action="digit" data-value="3">3</button>
            <button class="btn btn-operator" data-action="operator" data-value="+" aria-label="Sumar">+</button>

            <!-- Row 5 -->
            <button class="btn btn-digit btn-zero" data-action="digit" data-value="0">0</button>
            <button class="btn btn-digit" data-action="decimal" aria-label="Decimal">.</button>
            <button class="btn btn-equals" data-action="equals" aria-label="Igual">=</button>
        </div>
    </div>

    <p class="keyboard-hint">Puedes usar el teclado · Enter = · Esc = C</p>

    <footer>
        <p>Hecho por <a href="https://github.com/javips99" target="_blank">Javi</a> · HTML + CSS + JS</p>
    </footer>

    <script>
        // ── State ──────────────────────────────────────────────────
        let currentValue = '0';
        let previousValue = '';
        let operator = null;
        let shouldResetDisplay = false;
        let expression = '';

        // ── DOM ────────────────────────────────────────────────────
        const displayValue = document.getElementById('displayValue');
        const displayExpr  = document.getElementById('expression');
        const displayEl    = document.getElementById('display');

        // ── Helpers ────────────────────────────────────────────────
        function updateDisplay() {
            displayValue.classList.remove('small', 'xsmall');
            if (currentValue.length > 12) displayValue.classList.add('xsmall');
            else if (currentValue.length > 8) displayValue.classList.add('small');

            displayValue.textContent = formatNumber(currentValue);
            displayExpr.textContent  = expression;
        }

        function formatNumber(val) {
            if (val === 'Error') return 'Error';
            // Preserve trailing decimal point
            const hasTrailingDot = val.endsWith('.');
            const num = parseFloat(val);
            if (isNaN(num)) return val;

            // Avoid scientific notation for reasonable sizes
            if (Math.abs(num) > 1e12 || (Math.abs(num) < 1e-6 && num !== 0)) {
                return num.toPrecision(8).replace(/\.?0+$/, '');
            }

            // Format with up to 10 decimal places, removing trailing zeros
            let formatted = parseFloat(num.toFixed(10)).toString();
            if (hasTrailingDot && !formatted.includes('.')) formatted += '.';
            return formatted;
        }

        function operatorSymbol(op) {
            return { '+': '+', '-': '−', '*': '×', '/': '÷' }[op] || op;
        }

        // ── Actions ────────────────────────────────────────────────
        function inputDigit(digit) {
            displayEl.classList.remove('error');

            if (shouldResetDisplay) {
                currentValue = digit;
                shouldResetDisplay = false;
            } else {
                if (currentValue === '0' && digit !== '.') {
                    currentValue = digit;
                } else if (currentValue.length < 15) {
                    currentValue += digit;
                }
            }
            updateDisplay();
        }

        function inputDecimal() {
            displayEl.classList.remove('error');

            if (shouldResetDisplay) {
                currentValue = '0.';
                shouldResetDisplay = false;
                updateDisplay();
                return;
            }
            if (!currentValue.includes('.')) {
                currentValue += '.';
                updateDisplay();
            }
        }

        function inputOperator(op) {
            displayEl.classList.remove('error');

            if (currentValue === 'Error') return;

            // If there's a pending operation, compute it first (chaining)
            if (operator && !shouldResetDisplay) {
                compute();
            }

            previousValue = currentValue;
            operator = op;
            shouldResetDisplay = true;
            expression = `${formatNumber(previousValue)} ${operatorSymbol(op)}`;
            updateDisplay();
        }

        function compute() {
            if (!operator || previousValue === '') return;

            const prev = parseFloat(previousValue);
            const curr = parseFloat(currentValue);
            let result;

            switch (operator) {
                case '+': result = prev + curr; break;
                case '-': result = prev - curr; break;
                case '*': result = prev * curr; break;
                case '/':
                    if (curr === 0) {
                        currentValue = 'Error';
                        expression = '';
                        operator = null;
                        previousValue = '';
                        shouldResetDisplay = true;
                        displayEl.classList.add('error');
                        updateDisplay();
                        return;
                    }
                    result = prev / curr;
                    break;
                default: return;
            }

            expression = `${formatNumber(previousValue)} ${operatorSymbol(operator)} ${formatNumber(currentValue)} =`;
            currentValue = String(parseFloat(result.toFixed(10)));
            operator = null;
            previousValue = '';
            shouldResetDisplay = true;
            updateDisplay();
        }

        function clearAll() {
            currentValue = '0';
            previousValue = '';
            operator = null;
            shouldResetDisplay = false;
            expression = '';
            displayEl.classList.remove('error');
            updateDisplay();
        }

        function backspace() {
            if (shouldResetDisplay || currentValue === 'Error') {
                clearAll();
                return;
            }
            if (currentValue.length <= 1 || (currentValue.length === 2 && currentValue.startsWith('-'))) {
                currentValue = '0';
            } else {
                currentValue = currentValue.slice(0, -1);
            }
            updateDisplay();
        }

        function percent() {
            if (currentValue === 'Error') return;
            const val = parseFloat(currentValue);
            if (isNaN(val)) return;

            if (operator && previousValue !== '') {
                // e.g. 200 + 10% → 200 + 20
                currentValue = String(parseFloat((parseFloat(previousValue) * val / 100).toFixed(10)));
            } else {
                currentValue = String(parseFloat((val / 100).toFixed(10)));
            }
            shouldResetDisplay = true;
            updateDisplay();
        }

        // ── Event delegation ───────────────────────────────────────
        document.getElementById('calculator').addEventListener('click', (e) => {
            const btn = e.target.closest('[data-action]');
            if (!btn) return;

            // Ripple
            const ripple = document.createElement('span');
            ripple.classList.add('ripple');
            const rect = btn.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            ripple.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX - rect.left - size/2}px;top:${e.clientY - rect.top - size/2}px`;
            btn.appendChild(ripple);
            ripple.addEventListener('animationend', () => ripple.remove());

            const action = btn.dataset.action;
            const value  = btn.dataset.value;

            switch (action) {
                case 'digit':    inputDigit(value); break;
                case 'operator': inputOperator(value); break;
                case 'equals':   compute(); break;
                case 'clear':    clearAll(); break;
                case 'backspace': backspace(); break;
                case 'decimal':  inputDecimal(); break;
                case 'percent':  percent(); break;
            }
        });

        // ── Keyboard support ───────────────────────────────────────
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey || e.altKey || e.metaKey) return;

            if (e.key >= '0' && e.key <= '9') { inputDigit(e.key); return; }

            switch (e.key) {
                case '+': inputOperator('+'); break;
                case '-': inputOperator('-'); break;
                case '*': inputOperator('*'); break;
                case '/': e.preventDefault(); inputOperator('/'); break;
                case 'Enter':
                case '=': compute(); break;
                case 'Backspace': backspace(); break;
                case 'Escape':
                case 'c':
                case 'C': clearAll(); break;
                case '.':
                case ',': inputDecimal(); break;
                case '%': percent(); break;
            }
        });

        // Init
        updateDisplay();
    </script>

</body>
</html>
